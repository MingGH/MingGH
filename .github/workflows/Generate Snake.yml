name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-contribution-grid-snake.svg?palette=github-light
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark
            assets/github-contribution-grid-snake.gif?palette=github-dark

      - name: Commit generated files
        uses: EndBug/add-and-commit@v9
        with:
          add: "assets/github-contribution-grid-snake.svg assets/github-contribution-grid-snake-dark.svg assets/github-contribution-grid-snake.gif"
          default_author: github_actions
          message: "chore: update contribution snake"
